<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Side Hustle</title>

    <!-- Meta Tags -->
    <meta name="description" content="Review your shopping cart and checkout.">
    <meta name="author" content="Jerimy Brown">
    <meta name="robots" content="noindex, nofollow">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.sidehustle.llc/cart.html">
    <meta property="og:title" content="Shopping Cart - Side Hustle">
    <meta property="og:description" content="Review your shopping cart and checkout.">
    <meta property="og:image" content="https://www.sidehustle.llc/assets/images/og-preview.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://www.sidehustle.llc/cart.html">
    <meta name="twitter:title" content="Shopping Cart - Side Hustle">
    <meta name="twitter:description" content="Review your shopping cart and checkout.">
    <meta name="twitter:image" content="https://www.sidehustle.llc/assets/images/og-preview.jpg">

    <!-- Canonical -->
    <link rel="canonical" href="https://www.sidehustle.llc/cart.html">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts: Montserrat + Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <!-- Set background before CSS loads to prevent white flash on hard refresh -->
    <script>document.documentElement.style.backgroundColor=localStorage.getItem('theme')==='light'?'#fafafa':'#171717'</script>

    <link rel="stylesheet" href="assets/css/main.css?v=1776552023">

    <!-- Critical inline styles to prevent flash -->
    <style>
        .nav {
            background: linear-gradient(to bottom, rgba(23, 23, 23, 1) 0%, rgba(23, 23, 23, 1) 60%, rgba(23, 23, 23, 0) 100%) !important;
        }
        body:not([data-theme="dark"]) .nav {
            background: linear-gradient(to bottom, rgba(250, 250, 250, 1) 0%, rgba(250, 250, 250, 1) 60%, rgba(250, 250, 250, 0) 100%) !important;
        }

        /* Use regular (non-accent) logo */
        .logo {
            color: var(--color-text-primary) !important;
        }

        .logo .logo-text {
            color: var(--color-text-primary) !important;
        }

        .logo .logo-svg {
            background-image: url('assets/icons/logo-sh-dark-mode.svg') !important;
        }

        body:not([data-theme="dark"]) .logo .logo-svg {
            background-image: url('assets/icons/logo-sh-light-mode.svg') !important;
        }
    </style>

    <noscript>
        <style>
            body {
                opacity: 1 !important;
            }
        </style>
    </noscript>
</head>
<body>
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            document.documentElement.style.backgroundColor = '#171717';
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.removeAttribute('data-theme');
                document.documentElement.style.backgroundColor = '#fafafa';
            } else {
                document.body.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- Navigation Component Placeholder -->
    <div id="nav-placeholder"></div>
    <script src="assets/js/components/navigation-component.js?v=1776552023"></script>

    <!-- Main Content -->
    <main style="min-height: 100vh; padding-top: 100px;">
        <div class="cart-container">
            <header class="cart-header">
                <h1>Shopping Cart</h1>
            </header>

            <!-- Empty Cart State -->
            <div id="cart-empty" class="cart-empty" style="display: none;">
                <h2>Your cart is empty</h2>
                <p>Looks like you haven't added any items yet.</p>
                <a href="shop-all.html" class="button btn-primary">Browse Gallery</a>
            </div>

            <!-- Cart Content -->
            <div id="cart-content" style="display: none;">
                <!-- Cart Items -->
                <ul id="cart-items" class="cart-items" role="list" aria-label="Cart items">
                    <!-- Cart items will be rendered here by JavaScript -->
                </ul>

                <!-- Cart Summary -->
                <div id="cart-summary" class="cart-summary">
                    <!-- Summary will be rendered here by JavaScript -->
                </div>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <!-- Core modules -->
    <script src="assets/js/core/config.js?v=1776552023"></script>
    <script src="assets/js/core/theme-system.js?v=1776552023"></script>

    <!-- Utilities -->
    <script src="assets/js/utils/helpers.js?v=1776552023"></script>
    <script src="assets/js/utils/animations.js?v=1776552023"></script>

    <!-- Components -->
    <script src="assets/js/components/navigation.js?v=1776552023"></script>
    <script src="assets/js/components/mobile-menu.js?v=1776552023"></script>
    <script src="assets/js/components/logo-animation.js?v=1776552023"></script>

    <!-- Cart Page Module -->
    <script type="module" src="assets/js/cart/cart-page.js?v=1776552023"></script>

    <!-- Main initialization -->
    <script src="assets/js/main.js?v=1776552023"></script>
</body>
</html>
