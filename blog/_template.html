<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Side Hustle</title>

    <!-- Meta Tags -->
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="author" content="Jerimy Brown">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{TITLE}} - Side Hustle">
    <meta property="og:description" content="{{DESCRIPTION}}">

    <!-- Favicon -->
    <link rel="icon" href="../favicon.ico" type="image/x-icon">

    <!-- Google Fonts: Montserrat + Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <!-- Set background before CSS loads to prevent white flash on hard refresh -->
    <script>document.documentElement.style.backgroundColor=localStorage.getItem('theme')==='light'?'#fafafa':'#171717'</script>

    <link rel="stylesheet" href="../assets/css/main.css?v={{CACHE_VERSION}}">

    <noscript>
        <style>
            body {
                opacity: 1 !important;
            }
        </style>
    </noscript>
</head>
<body>
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            document.documentElement.style.backgroundColor = '#171717';
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.removeAttribute('data-theme');
                document.documentElement.style.backgroundColor = '#fafafa';
            } else {
                document.body.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- Navigation Component Placeholder -->
    <div id="nav-placeholder"></div>
    <script src="../assets/js/components/navigation-component.js?v={{CACHE_VERSION}}"></script>

    <!-- Blog Post Content -->
    <main style="min-height: 100vh; padding-top: 100px;">
        <article class="blog-article" data-post-slug="{{SLUG}}">
            <div class="container">
                <!-- Back link -->
                <a href="../blog.html" class="blog-back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Back to Blog
                </a>

                <!-- Article Header (full width) -->
                <header class="blog-article__header" id="blog-header">
                    <!-- Title, category, date rendered by JavaScript -->
                </header>

                <!-- Two-column layout: content left, carousel right -->
                <div class="blog-article__layout">
                    <div class="blog-article__content-column">
                        <!-- Article Body (inlined at build time) -->
                        <div class="blog-article__body">
                            {{CONTENT}}
                        </div>

                        <!-- Related Item (populated by JavaScript if relatedItem exists) -->
                        <div class="blog-article__related" id="blog-related"></div>
                    </div>

                    <!-- Carousel column (hidden if no images, shown by JS) -->
                    <div class="blog-article__images">
                        <div id="blog-carousel">
                            <!-- Carousel rendered by JavaScript if images exist -->
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <!-- Scripts -->
    <!-- Core modules -->
    <script src="../assets/js/core/config.js?v={{CACHE_VERSION}}"></script>
    <script src="../assets/js/core/theme-system.js?v={{CACHE_VERSION}}"></script>

    <!-- Utilities -->
    <script src="../assets/js/utils/helpers.js?v={{CACHE_VERSION}}"></script>
    <script src="../assets/js/utils/animations.js?v={{CACHE_VERSION}}"></script>

    <!-- Components -->
    <script src="../assets/js/components/navigation.js?v={{CACHE_VERSION}}"></script>
    <script src="../assets/js/components/mobile-menu.js?v={{CACHE_VERSION}}"></script>
    <script src="../assets/js/components/logo-animation.js?v={{CACHE_VERSION}}"></script>

    <!-- Blog Detail Module -->
    <script type="module" src="../assets/js/blog/blog-detail.js?v={{CACHE_VERSION}}"></script>

    <!-- Main initialization -->
    <script src="../assets/js/main.js?v={{CACHE_VERSION}}"></script>
</body>
</html>
